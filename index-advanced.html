<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Tracking - 360 Model Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0a0e27;
        }
        
        #arScene {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 100;
            border: 2px solid #00ff00;
            backdrop-filter: blur(5px);
        }
        
        .info-panel {
            top: 10px;
            left: 10px;
            max-width: 350px;
        }
        
        .status {
            top: 10px;
            right: 10px;
            max-width: 250px;
        }
        
        .controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 10px 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
            pointer-events: auto;
        }
        
        .btn:hover {
            background: #00cc00;
            transform: scale(1.05);
        }
        
        .btn.active {
            background: #ff6600;
            color: white;
        }
        
        .panel-title {
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
        }
        
        .stat-line {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .label {
            color: #00ff00;
        }
        
        .value {
            color: #ffffff;
            font-weight: bold;
        }
        
        .status-ok {
            color: #00ff00;
        }
        
        .status-warning {
            color: #ffff00;
        }
        
        .status-error {
            color: #ff0000;
        }
        
        .slider-container {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        .debug-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 10px;
            font-size: 11px;
            border-radius: 5px;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-info.active {
            display: block;
        }
    </style>
</head>
<body>
    <a-scene 
        id="arScene"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_stereo; matrixCodeType: 3x3;"
    >
        <!-- Tracker 1 - Model 1 -->
        <a-marker 
            id="marker1"
            preset="custom" 
            type="pattern" 
            url="Tracker/Tracker 1.patt"
            emitevents="true"
            smooth="true"
            smoothCount="10"
        >
            <a-entity
                id="model1"
                gltf-model="url(./Models/Model%201.glb)"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
                animation-mixer
            ></a-entity>
        </a-marker>

        <!-- Tracker 2 - Model 2 -->
        <a-marker 
            id="marker2"
            preset="custom" 
            type="pattern" 
            url="Tracker/Tracker 2.patt"
            emitevents="true"
            smooth="true"
            smoothCount="10"
        >
            <a-entity
                id="model2"
                gltf-model="url(./Models/Model%202.glb)"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
                animation-mixer
            ></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="container">
        <div class="panel info-panel">
            <div class="panel-title">🎯 Image Tracking System</div>
            <div class="stat-line">
                <span class="label">Status:</span>
                <span class="value" id="mainStatus">Initializing...</span>
            </div>
            <div class="stat-line">
                <span class="label">Active Marker:</span>
                <span class="value" id="activeMarker">None</span>
            </div>
            <div class="stat-line">
                <span class="label">Rotation:</span>
                <span class="value" id="rotationStatus">Stopped</span>
            </div>
            <div class="stat-line">
                <span class="label">Speed:</span>
                <span class="value" id="speedDisplay">2°/frame</span>
            </div>
        </div>

        <div class="panel status">
            <div class="panel-title">📊 System Info</div>
            <div class="stat-line">
                <span class="label">Model 1:</span>
                <span class="value status-ok">✓ Loaded</span>
            </div>
            <div class="stat-line">
                <span class="label">Model 2:</span>
                <span class="value status-ok">✓ Loaded</span>
            </div>
            <div class="stat-line">
                <span class="label">Camera:</span>
                <span class="value" id="cameraStatus">Accessing...</span>
            </div>
            <div class="stat-line">
                <span class="label">FPS:</span>
                <span class="value" id="fpsDisplay">--</span>
            </div>
        </div>

        <div class="controls panel">
            <button class="btn" id="toggleRotation" title="Start/Stop automatic rotation">
                ▶ Start Rotation
            </button>
            <button class="btn" id="toggleDebug" title="Show/Hide debug info">
                🐛 Debug
            </button>
            <div style="width: 100%; min-height: 0;"></div>
            <div class="slider-container" style="width: 250px;">
                <label for="speedSlider" style="font-size: 11px;">Rotation Speed: </label>
                <input type="range" id="speedSlider" min="0.5" max="10" step="0.5" value="2" title="Adjust rotation speed">
            </div>
        </div>

        <div class="debug-info" id="debugInfo">
            <strong>Debug Console:</strong>
            <div id="debugLog"></div>
        </div>
    </div>

    <script>
        // State management
        const state = {
            isRotating: false,
            currentMarker: null,
            currentModel: null,
            rotationSpeed: 2,
            frameCount: 0,
            lastTime: Date.now(),
            fps: 0,
            debugMode: false
        };

        const ui = {
            toggleBtn: document.getElementById('toggleRotation'),
            debugBtn: document.getElementById('toggleDebug'),
            debugLog: document.getElementById('debugLog'),
            debugInfo: document.getElementById('debugInfo'),
            speedSlider: document.getElementById('speedSlider'),
            speedDisplay: document.getElementById('speedDisplay'),
            activeMarker: document.getElementById('activeMarker'),
            rotationStatus: document.getElementById('rotationStatus'),
            mainStatus: document.getElementById('mainStatus'),
            fpsDisplay: document.getElementById('fpsDisplay'),
            cameraStatus: document.getElementById('cameraStatus')
        };

        // Logging function
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            console.log(logEntry);
            
            if (state.debugMode) {
                ui.debugLog.innerHTML += `<div>[${type.toUpperCase()}] ${message}</div>`;
                ui.debugLog.parentElement.scrollTop = ui.debugLog.parentElement.scrollHeight;
            }
        }

        // Marker events - Tracker 1
        document.getElementById('marker1').addEventListener('markerFound', function() {
            state.currentMarker = 'marker1';
            state.currentModel = document.getElementById('model1');
            ui.activeMarker.textContent = '📍 Marker 1 (Model 1)';
            ui.mainStatus.textContent = 'Marker 1 Found ✓';
            ui.mainStatus.className = 'value status-ok';
            log('Marker 1 detected', 'success');
        });

        document.getElementById('marker1').addEventListener('markerLost', function() {
            if (state.currentMarker === 'marker1') {
                state.currentMarker = null;
                state.currentModel = null;
                ui.activeMarker.textContent = 'None';
                ui.mainStatus.textContent = 'Waiting for marker...';
                ui.mainStatus.className = 'value status-warning';
                log('Marker 1 lost', 'warning');
            }
        });

        // Marker events - Tracker 2
        document.getElementById('marker2').addEventListener('markerFound', function() {
            state.currentMarker = 'marker2';
            state.currentModel = document.getElementById('model2');
            ui.activeMarker.textContent = '📍 Marker 2 (Model 2)';
            ui.mainStatus.textContent = 'Marker 2 Found ✓';
            ui.mainStatus.className = 'value status-ok';
            log('Marker 2 detected', 'success');
        });

        document.getElementById('marker2').addEventListener('markerLost', function() {
            if (state.currentMarker === 'marker2') {
                state.currentMarker = null;
                state.currentModel = null;
                ui.activeMarker.textContent = 'None';
                ui.mainStatus.textContent = 'Waiting for marker...';
                ui.mainStatus.className = 'value status-warning';
                log('Marker 2 lost', 'warning');
            }
        });

        // Toggle rotation
        ui.toggleBtn.addEventListener('click', function() {
            state.isRotating = !state.isRotating;
            ui.toggleBtn.textContent = state.isRotating ? '⏸ Stop Rotation' : '▶ Start Rotation';
            ui.toggleBtn.classList.toggle('active');
            ui.rotationStatus.textContent = state.isRotating ? 'Running ▶' : 'Stopped ⏹';
            log(`Rotation ${state.isRotating ? 'started' : 'stopped'}`);
        });

        // Toggle debug mode
        ui.debugBtn.addEventListener('click', function() {
            state.debugMode = !state.debugMode;
            ui.debugInfo.classList.toggle('active');
            ui.debugBtn.classList.toggle('active');
            if (state.debugMode) {
                ui.debugLog.innerHTML = '';
                log('Debug mode enabled');
            }
        });

        // Speed control
        ui.speedSlider.addEventListener('input', function(e) {
            state.rotationSpeed = parseFloat(e.target.value);
            ui.speedDisplay.textContent = state.rotationSpeed.toFixed(1) + '°/frame';
            log(`Rotation speed changed to ${state.rotationSpeed.toFixed(1)}°/frame`);
        });

        // FPS counter
        function updateFPS() {
            state.frameCount++;
            const now = Date.now();
            const elapsed = now - state.lastTime;
            
            if (elapsed >= 1000) {
                state.fps = Math.round(state.frameCount * 1000 / elapsed);
                ui.fpsDisplay.textContent = state.fps + ' FPS';
                state.frameCount = 0;
                state.lastTime = now;
            }
        }

        // Animation loop
        function animate() {
            updateFPS();
            
            if (state.isRotating && state.currentModel) {
                let rotation = state.currentModel.getAttribute('rotation');
                rotation.y += state.rotationSpeed;
                if (rotation.y >= 360) rotation.y = 0;
                state.currentModel.setAttribute('rotation', rotation);
            }
            
            requestAnimationFrame(animate);
        }

        // Initialize
        window.addEventListener('load', function() {
            log('System initialized');
            ui.mainStatus.textContent = 'Ready - Awaiting marker';
            ui.mainStatus.className = 'value status-ok';
            ui.cameraStatus.textContent = '✓ Active';
            ui.cameraStatus.className = 'value status-ok';
            animate();
        });

        // Handle errors
        window.addEventListener('error', function(event) {
            log(`Error: ${event.message}`, 'error');
        });

        console.log('Advanced Image Tracking System v2.0 Ready');
    </script>
</body>
</html>
