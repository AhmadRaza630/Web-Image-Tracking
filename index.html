<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tracker - Start Camera</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #arScene {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            text-align: center;
            padding: 30px;
        }
        .overlay h1 {
            font-size: 28px;
            margin-bottom: 18px;
            color: #00ff00;
        }
        .overlay p {
            margin-bottom: 20px;
            font-size: 16px;
            color: #ccc;
        }
        .start-button {
            padding: 16px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.35);
        }
        .start-button:hover {
            background: #a0ff00;
        }
        .status-bar {
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            z-index: 110;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: #00ff00;
            font-size: 14px;
        }
        .status-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #00ff00;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="overlay" id="startOverlay">
        <div>
            <h1>Start Image Tracking</h1>
            <p>Click the button below to open camera. Then point the camera at Tracker 1.png or Tracker 2.png to see the model appear above the image.</p>
            <button class="start-button" id="startButton">Open Camera</button>
        </div>
    </div>

    <div class="status-bar hidden" id="statusBar">
        <div class="status-box" id="statusModel">No tracker detected</div>
        <div class="status-box" id="statusInfo">Camera closed</div>
    </div>

    <a-scene 
        id="arScene"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_stereo; matrixCodeType: 3x3;"
    >
        <a-entity light="type: ambient; color: #ffffff; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #ffffff; intensity: 0.7" position="0 1 1"></a-entity>

        <a-marker 
            id="marker1"
            preset="custom" 
            type="pattern" 
            url="Tracker/Tracker%201.patt"
            emitevents="true"
            smooth="true"
            smoothCount="10"
        >
            <a-entity
                id="model1"
                gltf-model="url(./Models/Model%201.glb)"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
            ></a-entity>
        </a-marker>

        <a-marker 
            id="marker2"
            preset="custom" 
            type="pattern" 
            url="Tracker/Tracker%202.patt"
            emitevents="true"
            smooth="true"
            smoothCount="10"
        >
            <a-entity
                id="model2"
                gltf-model="url(./Models/Model%202.glb)"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
            ></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const startButton = document.getElementById('startButton');
        const startOverlay = document.getElementById('startOverlay');
        const statusBar = document.getElementById('statusBar');
        const statusModel = document.getElementById('statusModel');
        const statusInfo = document.getElementById('statusInfo');
        const arScene = document.getElementById('arScene');

        let currentModel = null;

        function showStatus(message, modelName = null) {
            statusInfo.textContent = message;
            if (modelName) {
                statusModel.textContent = modelName;
            } else {
                statusModel.textContent = 'No tracker detected';
            }
        }

        function startAR() {
            startOverlay.classList.add('hidden');
            arScene.style.display = 'block';
            statusBar.classList.remove('hidden');
            showStatus('Camera opening...');

            const scene = document.querySelector('a-scene');
            if (scene && scene.hasLoaded) {
                scene.play();
            } else if (scene) {
                scene.addEventListener('loaded', () => scene.play());
            }
        }

        startButton.addEventListener('click', startAR);

        document.getElementById('marker1').addEventListener('markerFound', function() {
            currentModel = document.getElementById('model1');
            showStatus('Tracker 1 detected', 'Model 1 visible');
        });

        document.getElementById('marker1').addEventListener('markerLost', function() {
            if (currentModel && currentModel.id === 'model1') {
                currentModel = null;
                showStatus('Tracker 1 lost');
            }
        });

        document.getElementById('marker2').addEventListener('markerFound', function() {
            currentModel = document.getElementById('model2');
            showStatus('Tracker 2 detected', 'Model 2 visible');
        });

        document.getElementById('marker2').addEventListener('markerLost', function() {
            if (currentModel && currentModel.id === 'model2') {
                currentModel = null;
                showStatus('Tracker 2 lost');
            }
        });

        window.addEventListener('load', function() {
            statusBar.classList.add('hidden');
            arScene.style.display = 'none';
        });
    </script>
</body>
</html>
