<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3JS Image Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/three.js/build/ar-threex.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #startButton {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.35);
        }
        #statusBox {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.75);
            color: #00ff00;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #00ff00;
            font-size: 14px;
            z-index: 2;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <button id="startButton">Open Camera</button>
    <div id="statusBox">Waiting to start</div>

    <script>
        const startButton = document.getElementById('startButton');
        const statusBox = document.getElementById('statusBox');

        let renderer, scene, camera, arToolkitSource, arToolkitContext;
        let markerRoot1, markerRoot2;
        let model1, model2;

        function updateStatus(text) {
            statusBox.textContent = text;
        }

        function initAR() {
            startButton.style.display = 'none';
            updateStatus('Opening camera...');

            scene = new THREE.Scene();
            camera = new THREE.Camera();
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setClearColor(new THREE.Color('black'), 0);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0px';
            renderer.domElement.style.left = '0px';
            document.body.appendChild(renderer.domElement);

            const light1 = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xffffff, 0.7);
            light2.position.set(0, 1, 1).normalize();
            scene.add(light2);

            arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
            arToolkitSource.init(() => onResize());
            window.addEventListener('resize', () => onResize());

            arToolkitContext = new THREEx.ArToolkitContext({
                cameraParametersUrl: 'https://cdn.jsdelivr.net/npm/ar.js@3.4.5/data/data/camera_para.dat',
                detectionMode: 'mono',
                matrixCodeType: '3x3',
            });

            arToolkitContext.init(() => {
                camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
                updateStatus('Camera ready. Scan a tracker.');
            });

            markerRoot1 = new THREE.Group();
            scene.add(markerRoot1);
            new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
                type: 'pattern',
                patternUrl: 'Tracker/Tracker%201.patt',
                changeMatrixMode: 'modelViewMatrix',
            });

            markerRoot2 = new THREE.Group();
            scene.add(markerRoot2);
            new THREEx.ArMarkerControls(arToolkitContext, markerRoot2, {
                type: 'pattern',
                patternUrl: 'Tracker/Tracker%202.patt',
                changeMatrixMode: 'modelViewMatrix',
            });

            const loader = new THREE.GLTFLoader();
            loader.load('Models/Model%201.glb', function (gltf) {
                model1 = gltf.scene;
                model1.scale.set(0.4, 0.4, 0.4);
                markerRoot1.add(model1);
            });
            loader.load('Models/Model%202.glb', function (gltf) {
                model2 = gltf.scene;
                model2.scale.set(0.4, 0.4, 0.4);
                markerRoot2.add(model2);
            });

            animate();
        }

        function onResize() {
            arToolkitSource.onResizeElement();
            arToolkitSource.copyElementSizeTo(renderer.domElement);
            if (arToolkitContext.arController !== null) {
                arToolkitSource.copyElementSizeTo(arToolkitContext.arController.canvas);
            }
        }

        function updateAR() {
            if (arToolkitSource.ready !== false) {
                arToolkitContext.update(arToolkitSource.domElement);

                if (markerRoot1.visible) {
                    updateStatus('Tracker 1 detected - Model 1 visible');
                    if (model1) model1.rotation.y += 0.02;
                } else if (markerRoot2.visible) {
                    updateStatus('Tracker 2 detected - Model 2 visible');
                    if (model2) model2.rotation.y += 0.02;
                } else {
                    updateStatus('No tracker detected');
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updateAR();
            renderer.render(scene, camera);
        }

        startButton.addEventListener('click', initAR);
    </script>
</body>
</html>
