<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3JS Image Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .status-box {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.75);
            color: #00ff00;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #00ff00;
            font-size: 14px;
            z-index: 2;
        }
        .hint-box {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="status-box" id="statusBox">Camera will start automatically. Scan tracker image.</div>
    <div class="hint-box">Use Tracker 1 or Tracker 2 images. Make sure Tracker 1.patt and Tracker 2.patt are in the Tracker folder.</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_stereo; matrixCodeType: 3x3;">
        <a-entity camera></a-entity>

        <a-marker preset="custom" type="pattern" url="Tracker/Tracker%201.patt" emitevents="true">
            <a-entity id="model1" gltf-model="url(Models/Model%201.glb)" scale="0.4 0.4 0.4" rotation="0 0 0" position="0 0 0"></a-entity>
        </a-marker>

        <a-marker preset="custom" type="pattern" url="Tracker/Tracker%202.patt" emitevents="true">
            <a-entity id="model2" gltf-model="url(Models/Model%202.glb)" scale="0.4 0.4 0.4" rotation="0 0 0" position="0 0 0"></a-entity>
        </a-marker>
    </a-scene>

    <script>
        const statusBox = document.getElementById('statusBox');
        const marker1 = document.querySelector('a-marker[url="Tracker/Tracker%201.patt"]');
        const marker2 = document.querySelector('a-marker[url="Tracker/Tracker%202.patt"]');

        function setStatus(text) {
            statusBox.textContent = text;
        }

        marker1.addEventListener('markerFound', () => setStatus('Tracker 1 detected. Model 1 visible.'));
        marker1.addEventListener('markerLost', () => setStatus('Tracker 1 lost. Scan a tracker image.'));

        marker2.addEventListener('markerFound', () => setStatus('Tracker 2 detected. Model 2 visible.'));
        marker2.addEventListener('markerLost', () => setStatus('Tracker 2 lost. Scan a tracker image.'));
    </script>
</body>
</html>
